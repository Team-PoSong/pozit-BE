  default.conf
    
    # ───────────────────────────────────────────────
    # 1) 80포트(http)로 들어오는 모든 요청을 https로 리다이렉션
    server {
    listen 80;
    server_name api.pozit.kr;
    return 301 https://pozit.kr$request_uri;
  }
    
    # ───────────────────────────────────────────────
    # 2) https://로 들어오는 요청을 서비스 중인 포트로 연결
    server {
    listen 443 ssl http2;
    server_name pozit.kr;

    # ssl 인증서 적용
    ssl_certificate /etc/letsencrypt/live/api.pozit.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pozit.kr/privkey.pem;

    location / { # location 이후 특정 Url을 처리하는 방법을 정의 (여기서는 / -> 즉, 모든 request)
    proxy_pass https://localhost:9001; # Request에 대해 어디로 리다이렉트하는지 작성. 8443 -> 자신의 springboot app 이사용하는 포트
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
    
    # ───────────────────────────────────────────────
    # 3) 도메인 이름이 다르면 404에러 처리
    server {
    if ($host = pozit.kr) {
    return 301 https://$host$request_uri;
    } # managed by Certbot
    
    listen 80;
    server_name pozit.kr;
    return 404; # managed by Certbot
  }

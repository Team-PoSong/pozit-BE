language: "ko-KR"
early_access: false

tone_instructions: >
  시니어 Spring Boot 개발자 관점에서 버그, 보안, 성능, 유지보수성을 중심으로 리뷰해주세요.
  스타일보다 실제 문제 위주로, 초보자도 이해하도록 이유와 개선안(Java 예시 포함)을 설명해주세요.
  Controller-Service-Repository 계층, DTO, 예외처리, 트랜잭션, JPA N+1, validation, 인증/인가, API 응답 구조를 고려해주세요.

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

  path_filters:
    - "!build/**"
    - "!target/**"
    - "!.gradle/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!**/*.md"
    - "!**/*.json"

chat:
  auto_reply: true
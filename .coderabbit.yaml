language: "ko-KR"
early_access: false

tone_instructions: >
  시니어 Spring Boot 백엔드 개발자의 관점에서 리뷰해주세요.
  버그, 보안, 성능, 안정성, 유지보수성을 우선적으로 검토해주세요.
  단순 코드 스타일이나 포맷팅보다는 실제 문제가 될 수 있는 사항을 중심으로 리뷰해주세요.
  초보 개발자도 이해할 수 있도록 이유와 개선 방법을 함께 설명하고,
  필요한 경우 간단한 Java 코드 예시를 제시해주세요.
  Spring Boot 계층 구조, Controller-Service-Repository 역할 분리, DTO 사용,
  예외 처리, 트랜잭션, JPA/N+1 문제, validation, 인증/인가, API 응답 구조를 함께 고려해주세요.

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

  path_filters:
    - "!build/**"
    - "!target/**"
    - "!.gradle/**"
    - "!node_modules/**"
    - "!**/*.lock"
    - "!**/*.md"
    - "!**/*.json"

chat:
  auto_reply: true